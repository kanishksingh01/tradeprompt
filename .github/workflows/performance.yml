name: Performance

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          POLYGON_API_KEY: stub
          ALPHA_VANTAGE_API_KEY: stub
          OPENAI_API_KEY: stub

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and analyse bundle
        run: npm run build
        env:
          POLYGON_API_KEY: stub
          ALPHA_VANTAGE_API_KEY: stub
          OPENAI_API_KEY: stub
          ANALYZE: true

      - name: Check .next/static sizes
        run: |
          echo "=== JS chunks ==="
          find .next/static/chunks -name '*.js' -not -name '*.map' \
            | xargs ls -lh 2>/dev/null \
            | awk '{print $5, $9}' | sort -rh | head -20

          echo ""
          echo "=== Total JS ==="
          find .next/static/chunks -name '*.js' -not -name '*.map' \
            | xargs du -ch 2>/dev/null | tail -1

          # Fail if any single chunk exceeds 500 kB
          OVERSIZED=$(find .next/static/chunks -name '*.js' -not -name '*.map' \
            -size +500k | wc -l)
          if [ "$OVERSIZED" -gt "0" ]; then
            echo "::error::$OVERSIZED JS chunk(s) exceed 500 kB — check imports"
            exit 1
          fi
